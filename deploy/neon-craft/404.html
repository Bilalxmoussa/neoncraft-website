<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Neon Craft</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF;
      --surface: #F5F5F7;
      --surface-2: #EDEDF0;
      --border: rgba(0,0,0,0.08);
      --accent: #6D5CFF;
      --accent-light: #8B7EFF;
      --accent-glow: rgba(109,92,255,0.06);
      --green: #34D399;
      --white: #09090B;
      --text: #52525B;
      --text-dim: #71717A;
      --text-faint: #D4D4D8;
      --serif: 'Instrument Serif', serif;
      --sans: 'Outfit', sans-serif;
      --mono: 'Geist Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }

    ::selection { background: var(--accent); color: white; }

    .grain {
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none; opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }

    .glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(109,92,255,0.06) 0%, transparent 55%);
      pointer-events: none;
      animation: glowFloat 8s ease-in-out infinite;
    }

    @keyframes glowFloat {
      0%, 100% { transform: translate(-50%, -50%) translate(0, 0); }
      50% { transform: translate(-50%, -50%) translate(20px, -15px); }
    }

    .content {
      text-align: center;
      position: relative;
      z-index: 2;
      padding: 2rem;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-code {
      font-family: var(--serif);
      font-size: clamp(6rem, 15vw, 10rem);
      color: var(--white);
      line-height: 1;
      letter-spacing: -4px;
      margin-bottom: 0.5rem;
      position: relative;
    }

    .error-code span { color: var(--accent); }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      background: var(--accent-glow);
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      border: 1px solid rgba(109,92,255,0.1);
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--white);
      font-weight: 400;
      letter-spacing: -1px;
      margin-bottom: 1rem;
    }

    h1 em { color: var(--accent); font-style: italic; }

    p {
      color: var(--text-dim);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto 2.5rem;
      font-weight: 300;
    }

    .btns {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-accent {
      background: var(--accent);
      color: white;
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: var(--sans);
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn-accent:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(109,92,255,0.3);
    }

    .btn-accent:active { transform: translateY(0) scale(0.98); }
    .btn-accent:focus-visible { outline: 2px solid var(--accent-light); outline-offset: 2px; }

    .btn-outline {
      background: transparent;
      color: var(--text);
      padding: 0.85rem 2rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: var(--sans);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.3s, color 0.3s, transform 0.3s;
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    .btn-outline:active { transform: translateY(0) scale(0.98); }
    .btn-outline:focus-visible { outline: 2px solid var(--accent-light); outline-offset: 2px; }

    .footer-line {
      position: absolute;
      bottom: 2rem;
      font-size: 0.7rem;
      color: var(--text-faint);
      z-index: 2;
    }

    .footer-line a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer-line a:hover { color: var(--accent-light); }
  </style>
</head>
<body>

<div class="grain"></div>
<div class="glow"></div>

<div class="content">
  <div class="tag">// Page Not Found</div>
  <div class="error-code">4<span>0</span>4</div>
  <h1>This page doesn't <em>exist.</em></h1>
  <p>The page you're looking for might have been moved, renamed, or may never have existed. Let's get you back on track.</p>
  <div class="btns">
    <a href="/" class="btn-accent">Back to Homepage</a>
    <a href="/#contact" class="btn-outline">Get in Touch</a>
  </div>
</div>

<div class="footer-line">© 2026 <a href="/">Neon Craft</a> — Web Design Ottawa</div>

</body>
</html>
