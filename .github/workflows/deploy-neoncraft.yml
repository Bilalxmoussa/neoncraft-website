name: Deploy NeonCraft to Hostinger

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy/neon-craft/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 65002 82.29.191.98 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Hostinger
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p 65002" \
            deploy/neon-craft/ \
            u788930128@82.29.191.98:/home/u788930128/domains/neoncraft.me/public_html/
